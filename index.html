  <script>
    (function() {
      const K = 'rde_v1';
      let S = { curView: 'dashboard', tier: 'free', analysis: null, selConcepts: [], compDeals: [],
        pipeline: [
          { id: 1, n: 'Sample Project', st: 'Analysis', sc: 78, r: 24.7, a: '800 Congress Ave, Austin TX', z: 'C-MU', f: 4.0, h: 90, l: 24000, lc: 2100000, hc: 255, rt: 3300, ct: 'concrete', pr: 1.0, um: [15,40,35,10], rp: 15, af: 10, ph: false, ec: true },
        ],
        conceptFilter: { style: 'all', industry: 'all', scale: 'all' },
        contacts: [],
        msgs: {}, unread: {}, smsHistory: [], callHistory: [],
      };

      function save() { try { localStorage.setItem(K, JSON.stringify({ curView: S.curView, tier: S.tier, selConcepts: S.selConcepts, compDeals: S.compDeals, pipeline: S.pipeline, conceptFilter: S.conceptFilter })); } catch (e) {} }
      function toast(m, t = 3000) { const c = document.getElementById('toastContainer'); const e = document.createElement('div'); e.className = 'toast'; e.innerHTML = m; c.appendChild(e); setTimeout(() => e.remove(), t); }

      function marketCtx(a, z) { const b = { hcb: 245, rb: 3100, cr: 0.048, ds: 0.65, mn: 'National' }; const al = (a || '').toLowerCase(); if (al.includes('austin')) { b.rb = 3350; b.cr = 0.046; b.ds = 0.78; b.mn = 'Austin MSA'; } else if (al.includes('los angeles')) { b.rb = 3700; b.hcb = 320; b.cr = 0.041; b.ds = 0.82; b.mn = 'LA MSA'; } else if (al.includes('miami')) { b.rb = 3200; b.hcb = 270; b.ds = 0.71; b.mn = 'Miami MSA'; } else if (al.includes('phoenix')) { b.rb = 2800; b.hcb = 225; b.ds = 0.69; b.mn = 'Phoenix MSA'; } else if (al.includes('denver')) { b.rb = 3000; b.hcb = 260; b.ds = 0.72; b.mn = 'Denver MSA'; } else if (al.includes('nashville')) { b.rb = 2900; b.hcb = 230; b.ds = 0.74; b.mn = 'Nashville MSA'; } if ((z || '').includes('TOD')) { b.rb *= 1.08; } return b; }
      function regCtx(c, z) { const d = { ep: 'By-right (6-8 mo)', er: 'low', ns: 0.35, nr: 'Medium', ifu: 18500, ip: 10 }; const cl = (c || '').toLowerCase(); if (cl.includes('austin')) { d.ifu = 18500; } else if (cl.includes('los angeles')) { d.ifu = 25000; d.ip = 15; d.ep = 'Conditional (12-18 mo)'; d.er = 'high'; d.nr = 'High'; } else if (cl.includes('phoenix')) { d.ifu = 12000; d.ip = 5; d.ep = 'By-right (4-6 mo)'; d.nr = 'Low'; } if ((z || '').includes('TOD')) { d.ep = 'Expedited (4-5 mo)'; } return d; }

      function analyze() {
        const a = document.getElementById('sa')?.value || '800 Congress Ave, Austin TX';
        const z = document.getElementById('sz')?.value || 'C-MU'; const fl = parseFloat(document.getElementById('sf')?.value) || 4.0;
        const mh = parseFloat(document.getElementById('sh')?.value) || 90; const ls = parseFloat(document.getElementById('sl')?.value) || 24000;
        const sr = document.getElementById('ss')?.value || '15 / 10'; const lc = parseFloat(document.getElementById('slc')?.value) || 2100000;
        const ct = document.getElementById('sct')?.value || 'concrete'; const hci = parseFloat(document.getElementById('shc')?.value) || 255;
        const mr = parseFloat(document.getElementById('smr')?.value) || 3300; const pr = parseFloat(document.getElementById('spr')?.value) || 1.0;
        const umSt = parseInt(document.getElementById('sumSt')?.value) || 15; const um1 = parseInt(document.getElementById('sum1')?.value) || 40;
        const um2 = parseInt(document.getElementById('sum2')?.value) || 35; const um3 = parseInt(document.getElementById('sum3')?.value) || 10;
        const rp = parseFloat(document.getElementById('srp')?.value) || 15; const af = parseFloat(document.getElementById('saf')?.value) || 10;
        const ph = document.getElementById('sph')?.value === 'true'; const ec = document.getElementById('sec')?.value === 'true';
        const ctCost = { wood: 200, concrete: 280, steel: 340 }[ct] || 255; const effectiveHC = hci > 0 ? hci : ctCost;
        const nums = (sr || '15/10').match(/\d+/g) || [15, 10]; const fs = parseFloat(nums[0]) || 15; const ss = parseFloat(nums[1]) || 10;
        const mk = marketCtx(a, z); const cn = (a || '').split(',').slice(1).join(',').trim() || 'Austin'; const rg = regCtx(cn, z);
        const lw = Math.sqrt(ls * 1.3); const ld = ls / lw; const bw = Math.max(12, lw - 2 * ss); const bd = Math.max(12, ld - fs - (fs * 0.7));
        const fp = bw * bd; const mg = ls * fl; const sbh = Math.floor(mh / 11); const sbf = mg > 0 && fp > 0 ? Math.floor(mg / fp) : 1;
        const as = Math.min(sbh, Math.max(1, sbf), 12); const ag = Math.min(mg, fp * as);
        const ecDeduction = ec && as >= 5 ? 0.10 : ec && as >= 3 ? 0.06 : 0; const rpDeduction = (rp / 100) * (as >= 3 ? 0.85 : 1.0);
        const effGFA = ag * (1 - ecDeduction - rpDeduction); const resGFA = effGFA * (1 - rp / 100); const retGFA = effGFA * (rp / 100);
        const umTotal = umSt + um1 + um2 + um3; const umPct = umTotal > 0 ? [umSt / umTotal, um1 / umTotal, um2 / umTotal, um3 / umTotal] : [0.15, 0.40, 0.35, 0.10];
        const unitSizes = [550, 750, 1050, 1350]; const avgUnitSize = umPct.reduce((acc, p, i) => acc + p * unitSizes[i], 0);
        const eff = (z || '').includes('MU') || (z || '').includes('Mixed') ? 0.84 : 0.87; const nl = (resGFA * eff) + (retGFA * 0.92);
        const uc = Math.floor(resGFA * eff / avgUnitSize); const rpu = mr > 0 ? mr : mk.rb;
        const resRent = uc * rpu * 12; const retRent = retGFA * (rpu * 0.06); const agr = resRent + retRent;
        const egi = agr * 0.95; const noi = egi * 0.70; const cr = mk.cr; const sv = cr > 0 ? noi / cr : 0;
        const parkSpaces = Math.round(uc * pr); const parkCost = parkSpaces * 18000; const thc = ag * effectiveHC + parkCost;
        const sc = thc * 0.175; const afUnits = Math.round(uc * (af / 100)); const afRentLoss = afUnits * rpu * 0.30 * 12;
        const tpc = lc + thc + sc + afRentLoss; const pf = sv - tpc; const roi = tpc > 0 ? (pf / tpc) * 100 : 0;
        const mg2 = sv > 0 ? (pf / sv) * 100 : 0; const phaseMult = ph ? 1.12 : 1.0; const adjROI = roi / phaseMult;
        function cs() { let s = 0; if (adjROI > 30) s += 35; else if (adjROI > 20) s += 25; else if (adjROI > 12) s += 15; else s += 5; if (rg.er === 'low') s += 25; else if (rg.er === 'medium') s += 15; else s += 5; if (mk.ds > 0.75) s += 25; else if (mk.ds > 0.55) s += 15; else s += 5; if (uc > 50) s += 15; else if (uc > 20) s += 10; if (rg.ns < 0.3) s += 10; else if (rg.ns < 0.5) s += 5; return Math.min(100, Math.max(0, Math.round(s))); }
        const ds = cs(); const mt = mk.am < 12 ? 'Strong' : mk.am < 16 ? 'Moderate' : 'Slow';
        return { ms: { mg, fp, as, ag: effGFA, fl, mh, ecDeduction, rpDeduction, resGFA, retGFA }, yi: { uc, nl, avgUnitSize, egi, noi, rpu, parkSpaces, afUnits, umBreakdown: [Math.round(uc * umPct[0]), Math.round(uc * umPct[1]), Math.round(uc * umPct[2]), Math.round(uc * umPct[3])] }, fi: { tpc, gdv: sv, pf, roi, mg2, adjROI, effectiveHC, ct, parkCost, afRentLoss, phaseMult }, ds, dsl: ds >= 80 ? 'STRONG BUY' : ds >= 60 ? 'BUY' : ds >= 40 ? 'HOLD' : 'PASS', rk: { ep: rg.ep, nr: rg.nr, mt }, inp: { a, z, fl, mh, ls, lc, hci, mr, ct, pr, umSt, um1, um2, um3, rp, af, ph, ec } };
      }

      function updateAnalyzerUI() {
        S.analysis = analyze(); const d = S.analysis; const t = S.tier;
        const me = document.getElementById('mc'); if (me) me.innerHTML = `<strong>FAR:</strong> ${d.ms.fl} | <strong>Stories:</strong> ${d.ms.as} | <strong>GFA:</strong> ${d.ms.ag.toLocaleString()} sf`;
        const ye = document.getElementById('yc'); if (ye) ye.innerHTML = `<strong>Units:</strong> ${d.yi.uc} | <strong>NLA:</strong> ${d.yi.nl.toLocaleString()} sf<br><strong>Mix:</strong> St: ${d.yi.umBreakdown[0]} | 1BR: ${d.yi.umBreakdown[1]} | 2BR: ${d.yi.umBreakdown[2]} | 3BR: ${d.yi.umBreakdown[3]}${t!=='free'?`<br><strong>EGI:</strong> $${d.yi.egi.toLocaleString()} | <strong>NOI:</strong> $${d.yi.noi.toLocaleString()}` : ''}`;
        const ge = document.getElementById('gv'); const ce = document.getElementById('tc'); const pe = document.getElementById('pv'); const re = document.getElementById('rv');
        if (ge) ge.textContent = t !== 'free' ? '$' + d.fi.gdv.toLocaleString() : '$---';
        if (ce) ce.textContent = t !== 'free' ? '$' + d.fi.tpc.toLocaleString() : '$---';
        if (pe) pe.textContent = t !== 'free' ? '$' + d.fi.pf.toLocaleString() : '$---';
        if (re) re.textContent = t !== 'free' ? d.fi.roi.toFixed(1) + '%' : '--%';
        const ds = document.getElementById('ds'); const dc = document.getElementById('dc');
        if (ds && dc) { ds.style.display = t === 'deep' ? 'block' : 'none'; if (t === 'deep') dc.innerHTML = `<strong>Sensitivity:</strong> ±15% → $${(d.fi.pf*0.7).toLocaleString()}–$${(d.fi.pf*1.3).toLocaleString()}`; }
        const lb = document.getElementById('lb'); const rc = document.getElementById('rc');
        if (lb && rc) { lb.style.display = t === 'free' ? 'block' : 'none'; rc.classList.toggle('locked', t === 'free'); }
        save();
      }

      function setTier(t) { S.tier = t; updateAnalyzerUI(); toast(`Tier: <strong>${t==='free'?'Free':t==='full'?'Full ($499)':'Deep ($1,499)'}</strong>`); }
      function setCF(type, val) { S.conceptFilter[type] = val; save(); render('concepts'); }

      const CL = [
        { id: 1, n: 'Modern Glass Tower', s: 'modern', ind: 'mixed-use', sc: 'large', ic: 'fa-building', ba: 'best-roi', bt: 'BEST ROI', ur: '60-200', re: '+3.2%', ds: 'Full curtain wall with cantilevered balconies.' },
        { id: 2, n: 'Miami Modern', s: 'modern', ind: 'hospitality', sc: 'large', ic: 'fa-umbrella-beach', ba: '', bt: '', ur: '30-100', re: '+1.5%', ds: 'Pastel panels, curved corners, resort-style.' },
        { id: 3, n: 'Scandi Minimal Office', s: 'modern', ind: 'office', sc: 'medium', ic: 'fa-tree', ba: '', bt: '', ur: '20-60', re: '+0.8%', ds: 'Light wood slats, large windows.' },
        { id: 4, n: 'Modern Courtyard Living', s: 'modern', ind: 'multifamily', sc: 'medium', ic: 'fa-city', ba: 'best-fit', bt: 'BEST FIT', ur: '30-90', re: '+1.8%', ds: 'Clean lines with central courtyard.' },
        { id: 5, n: 'Glass Office Pavilion', s: 'modern', ind: 'office', sc: 'small', ic: 'fa-building', ba: '', bt: '', ur: '8-25', re: '+0.6%', ds: 'Floor-to-ceiling glass.' },
        { id: 6, n: 'Resort Modern Hotel', s: 'modern', ind: 'hospitality', sc: 'medium', ic: 'fa-hotel', ba: 'premium', bt: 'LUXURY', ur: '40-120', re: '+2.5%', ds: 'Dramatic porte-cochère.' },
        { id: 7, n: 'Urban Industrial Loft', s: 'industrial', ind: 'mixed-use', sc: 'large', ic: 'fa-industry', ba: '', bt: '', ur: '40-120', re: '+0.5%', ds: 'Exposed steel, factory windows.' },
        { id: 8, n: 'Concrete Brutalist', s: 'industrial', ind: 'mixed-use', sc: 'large', ic: 'fa-cubes', ba: '', bt: '', ur: '30-80', re: '-0.3%', ds: 'Board-formed concrete.' },
        { id: 9, n: 'Steel Frame Office', s: 'industrial', ind: 'office', sc: 'large', ic: 'fa-warehouse', ba: '', bt: '', ur: '40-150', re: '+0.8%', ds: 'Steel frame, flexible floor plates.' },
        { id: 10, n: 'Adaptive Reuse Hotel', s: 'industrial', ind: 'hospitality', sc: 'medium', ic: 'fa-hotel', ba: '', bt: '', ur: '30-80', re: '+1.5%', ds: 'Converted warehouse, industrial chic.' },
        { id: 11, n: 'Timber Frame Industrial', s: 'industrial', ind: 'multifamily', sc: 'small', ic: 'fa-home', ba: '', bt: '', ur: '8-20', re: '+0.3%', ds: 'Heavy timber, loft-style units.' },
        { id: 12, n: 'Foundry Creative Office', s: 'industrial', ind: 'office', sc: 'small', ic: 'fa-briefcase', ba: '', bt: '', ur: '8-25', re: '+0.4%', ds: 'Converted foundry, soaring ceilings.' },
        { id: 13, n: 'Warm Brick + Metal', s: 'warm', ind: 'multifamily', sc: 'medium', ic: 'fa-warehouse', ba: 'best-fit', bt: 'BEST FIT', ur: '30-100', re: '+1.8%', ds: 'Contextual brick with metal accents.' },
        { id: 14, n: 'Craftsman Revival', s: 'warm', ind: 'multifamily', sc: 'small', ic: 'fa-home', ba: 'best-fit', bt: 'CONTEXTUAL', ur: '8-25', re: '+0.2%', ds: 'Wood detailing, covered porches.' },
        { id: 15, n: 'Farmhouse Modern', s: 'warm', ind: 'multifamily', sc: 'small', ic: 'fa-tractor', ba: '', bt: '', ur: '8-20', re: '-0.5%', ds: 'Board and batten, black windows.' },
        { id: 16, n: 'Timber Creative Office', s: 'warm', ind: 'office', sc: 'medium', ic: 'fa-tree', ba: '', bt: '', ur: '15-40', re: '+0.5%', ds: 'Exposed timber beams, warm wood.' },
        { id: 17, n: 'Boutique Brick Hotel', s: 'warm', ind: 'hospitality', sc: 'medium', ic: 'fa-hotel', ba: 'best-fit', bt: 'CHARMING', ur: '20-60', re: '+1.8%', ds: 'Exposed brick, intimate courtyard.' },
        { id: 18, n: 'Warm Mixed-Use Corner', s: 'warm', ind: 'mixed-use', sc: 'medium', ic: 'fa-store', ba: '', bt: '', ur: '20-50', re: '+1.2%', ds: 'Corner building with ground-floor café.' },
        { id: 19, n: 'Green Terrace Living', s: 'specialty', ind: 'multifamily', sc: 'medium', ic: 'fa-leaf', ba: 'premium', bt: 'PREMIUM', ur: '30-90', re: '+2.1%', ds: 'Living walls, sky gardens.' },
        { id: 20, n: 'Biophilic Tower', s: 'specialty', ind: 'mixed-use', sc: 'large', ic: 'fa-seedling', ba: 'premium', bt: 'LUXURY', ur: '50-150', re: '+4.1%', ds: 'Vertical gardens, natural materials.' },
        { id: 21, n: 'Art Deco Revival', s: 'specialty', ind: 'hospitality', sc: 'medium', ic: 'fa-star', ba: 'premium', bt: 'ICONIC', ur: '20-60', re: '+2.7%', ds: 'Stepped massing, geometric ornament.' },
        { id: 22, n: 'Parametric Landmark', s: 'specialty', ind: 'office', sc: 'large', ic: 'fa-crown', ba: 'premium', bt: 'LANDMARK', ur: '40-180', re: '+3.5%', ds: 'Algorithmically generated facade.' },
        { id: 23, n: 'Eco-Hospitality Retreat', s: 'specialty', ind: 'hospitality', sc: 'small', ic: 'fa-spa', ba: 'premium', bt: 'BOUTIQUE', ur: '10-30', re: '+2.3%', ds: 'Fully sustainable, carbon-neutral.' },
        { id: 24, n: 'Living Building Mixed-Use', s: 'specialty', ind: 'mixed-use', sc: 'small', ic: 'fa-sun', ba: 'premium', bt: 'NET ZERO', ur: '8-25', re: '+1.8%', ds: 'Net-zero energy and water.' },
      ];

      function filtC() { const f = S.conceptFilter; return CL.filter(c => { if (f.style !== 'all' && c.s !== f.style) return false; if (f.industry !== 'all' && c.ind !== f.industry) return false; if (f.scale !== 'all' && c.sc !== f.scale) return false; return true; }); }
      function previewConcept(cid) { const c = CL.find(x => x.id === cid); if (!c) return; toast(`<strong>${c.n}</strong><br>${c.ds}<br>${c.ur} units | ROI: ${c.re} | $1,999`, 5000); }

      function render(vn) {
        S.curView = vn; const a = document.getElementById('contentArea'); if (!a || !views[vn]) return;
        a.innerHTML = views[vn](); if (vn === 'analyzer') setTimeout(updateAnalyzerUI, 80);
        save();
      }

      const views = {
        dashboard: () => { const d = S.analysis || analyze(); return `<div class="grid-2"><div class="card"><div class="card-header">DEAL SCORE</div><div class="score-dial">${d.ds}</div><p style="text-align:center;color:var(--gold);font-weight:700;">${d.dsl}</p></div><div class="card"><div class="card-header">PIPELINE</div><p style="color:var(--text-muted);font-size:0.6rem;">Add your first deal in the Analyzer tab.</p></div></div>`; },
        analyzer: () => `
          <div class="grid-2">
            <div class="card"><div class="card-header">PARAMETERS</div>
              <div class="form-grid">
                <div class="field span-3"><label>ADDRESS</label><input id="sa" placeholder="Enter address..." onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>ZONING</label><select id="sz" onchange="updateAnalyzerUI()"><option value="C-MU">Mixed-Use</option><option value="R-MF">Res MF</option><option value="D-TOD">TOD</option></select></div>
                <div class="field"><label>FAR</label><input id="sf" type="number" value="4.0" step="0.1" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>HEIGHT</label><input id="sh" type="number" value="90" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>LOT (SF)</label><input id="sl" type="number" value="24000" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>SETBACKS</label><input id="ss" value="15 / 10" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>LAND COST</label><input id="slc" type="number" value="2100000" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>CONSTRUCTION</label><select id="sct" onchange="updateAnalyzerUI()"><option value="wood">Wood ($200/sf)</option><option value="concrete" selected>Concrete ($280/sf)</option><option value="steel">Steel ($340/sf)</option></select></div>
                <div class="field"><label>COST/SF</label><input id="shc" type="number" value="255" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>RENT/UNIT</label><input id="smr" type="number" value="3300" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>PARKING</label><select id="spr" onchange="updateAnalyzerUI()"><option value="0.5">0.5 (TOD)</option><option value="1.0" selected>1.0 (Std)</option><option value="1.5">1.5 (Suburb)</option></select></div>
                <div class="field"><label>RETAIL %</label><input id="srp" type="range" min="0" max="40" value="15" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>AFFORDABLE %</label><input id="saf" type="range" min="0" max="30" value="10" onchange="updateAnalyzerUI()"></div>
                <div class="field"><label>PHASED?</label><select id="sph" onchange="updateAnalyzerUI()"><option value="false">Single</option><option value="true">Multi (+12%)</option></select></div>
                <div class="field"><label>ELEVATOR?</label><select id="sec" onchange="updateAnalyzerUI()"><option value="false">No</option><option value="true" selected>Yes</option></select></div>
                <div class="field span-3"><label>UNIT MIX % (St / 1BR / 2BR / 3BR)</label><div style="display:flex;gap:0.4rem;"><input id="sumSt" type="number" value="15" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="St"><input id="sum1" type="number" value="40" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="1BR"><input id="sum2" type="number" value="35" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="2BR"><input id="sum3" type="number" value="10" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="3BR"></div></div>
              </div>
              <div style="display:flex;gap:0.3rem;margin-top:0.6rem;"><button class="btn btn-gold" style="flex:1;" onclick="setTier('free')">FREE</button><button class="btn btn-gold" style="flex:1;" onclick="setTier('full')">FULL $499</button><button class="btn btn-gold" style="flex:1;" onclick="setTier('deep')">DEEP $1,499</button></div>
            </div>
            <div class="card lock-overlay" id="rc"><div id="lb" class="lock-badge">UNLOCK</div><div class="card-header">RESULTS</div><div class="metric"><span class="metric-label">GDV</span><span class="metric-value" id="gv">$---</span></div><div class="metric"><span class="metric-label">COST</span><span class="metric-value" id="tc">$---</span></div><div class="metric"><span class="metric-label">PROFIT</span><span class="metric-value green" id="pv">$---</span></div><div class="metric"><span class="metric-label">ROI</span><span class="metric-value" id="rv">--%</span></div><div style="font-weight:600;color:var(--gold);font-size:0.65rem;">MASSING</div><div class="study-box" id="mc"></div><div style="font-weight:600;color:var(--gold);font-size:0.65rem;margin-top:0.3rem;">YIELD</div><div class="study-box" id="yc"></div><div id="ds" style="display:none;"><div style="font-weight:600;color:var(--gold);font-size:0.65rem;">DEEP</div><div class="study-box" id="dc"></div></div></div>
          </div>`,
        concepts: () => { const filtered = filtC(); return `<div class="card"><div class="card-header">CONCEPT GALLERY</div><div class="filter-bar"><span style="color:var(--text-muted);font-size:0.5rem;">STYLE:</span>${['all','modern','industrial','warm','specialty'].map(s=>`<button class="filter-btn ${S.conceptFilter.style===s?'on':''}" onclick="setCF('style','${s}')">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}<span style="color:var(--text-muted);font-size:0.5rem;margin-left:0.5rem;">INDUSTRY:</span>${['all','multifamily','mixed-use','office','hospitality'].map(s=>`<button class="filter-btn ${S.conceptFilter.industry===s?'on':''}" onclick="setCF('industry','${s}')">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}<span style="color:var(--text-muted);font-size:0.5rem;margin-left:0.5rem;">SCALE:</span>${['all','small','medium','large'].map(s=>`<button class="filter-btn ${S.conceptFilter.scale===s?'on':''}" onclick="setCF('scale','${s}')">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}</div>${filtered.length===0?`<div class="empty-state"><i class="fas fa-search"></i><p>No concepts match.</p><button class="btn btn-gold" onclick="setCF('style','all');setCF('industry','all');setCF('scale','all');">RESET</button></div>`:`<div class="concept-grid">${filtered.map(c=>`<div class="concept-card" onclick="previewConcept(${c.id})"><div class="concept-img"><i class="fas fa-${c.ic}"></i>${c.ba?`<span class="concept-badge ${c.ba==='best-roi'?'badge-roi':c.ba==='best-fit'?'badge-fit':'badge-premium'}">${c.bt}</span>`:''}</div><div class="concept-info"><h4>${c.n}</h4><span class="tag">${c.ur}u</span> <span class="tag gold">${c.re}</span></div></div>`).join('')}</div>`}</div>`; },
        finance: () => `<div class="card"><div class="card-header">CAPITAL STACK</div><p style="color:var(--text-muted);font-size:0.6rem;">Capital stack modeling available in full version.</p></div>`,
        research: () => `<div class="card"><div class="card-header">RESEARCH</div><p style="color:var(--text-muted);font-size:0.6rem;">Market research and regulatory intelligence available in full version.</p></div>`,
        network: () => `<div class="card"><div class="card-header">NETWORK</div><p style="color:var(--text-muted);font-size:0.6rem;">Project network and contacts available in full version.</p></div>`,
      };

      window.updateAnalyzerUI = updateAnalyzerUI; window.setTier = setTier; window.setCF = setCF;
      window.previewConcept = previewConcept; window.render = render;

      document.getElementById('mainNav').addEventListener('click', e => { const b = e.target.closest('.nav-btn'); if (!b) return; document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(b.dataset.view); });

      S.analysis = analyze(); render('dashboard');

      if (typeof google !== 'undefined' && google.maps && google.maps.places) {
        const input = document.getElementById('sa');
        if (input) {
          const autocomplete = new google.maps.places.Autocomplete(input, { types: ['address'], componentRestrictions: { country: 'us' } });
          autocomplete.addListener('place_changed', () => { const place = autocomplete.getPlace(); if (place.formatted_address) { input.value = place.formatted_address; updateAnalyzerUI(); } });
        }
      } else {
        window.addEventListener('load', () => {
          if (typeof google !== 'undefined' && google.maps && google.maps.places) {
            const input = document.getElementById('sa');
            if (input) {
              const autocomplete = new google.maps.places.Autocomplete(input, { types: ['address'], componentRestrictions: { country: 'us' } });
              autocomplete.addListener('place_changed', () => { const place = autocomplete.getPlace(); if (place.formatted_address) { input.value = place.formatted_address; updateAnalyzerUI(); } });
            }
          }
        });
      }
    })();
  </script>
</body>
</html>
