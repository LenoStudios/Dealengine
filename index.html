<!DOCTYPE html>
<html lang="en">
<head>

  <title>Deal Engine | AI Land Development Feasibility Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --obsidian: #080a0d;
      --charcoal: #0f1419;
      --slate: #1a2127;
      --concrete: #242d34;
      --steel: #3a453a;
      --gold: #d4af37;
      --gold-light: #f0da8c;
      --gold-dark: #b8960f;
      --gold-glow: 0 0 20px rgba(212, 175, 55, 0.4);
      --gold-dim: rgba(212, 175, 55, 0.08);
      --profit: #2ecc71;
      --profit-glow: 0 0 12px rgba(46, 204, 113, 0.4);
      --warning: #f39c12;
      --danger: #e74c3c;
      --info: #5dade2;
      --premium: #9b59b6;
      --text-primary: #f0e5c6;
      --text-secondary: #cfc5a5;
      --text-muted: #b7ad8c;
      --text-label: #b9aa8c;
      --font-display: 'Playfair Display', serif;
      --font-mono: 'DM Mono', monospace;
      --radius-sm: 0.5rem;
      --radius-md: 0.8rem;
      --radius-lg: 1.2rem;
      --radius-xl: 1.5rem;
      --transition: 0.22s ease;
      --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--obsidian);
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 0.75rem;
      font-family: var(--font-mono); color: var(--text-primary);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(46,204,113,0.02) 0%, transparent 50%);
    }
    .grid-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.022;
      background-image: linear-gradient(rgba(212,175,55,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.3) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .particle { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; background: var(--gold); opacity: 0; animation: floatUp 9s infinite ease-in; }
    @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.05; } 90% { opacity: 0.03; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
    .app-wrapper {
      max-width: 1500px; width: 100%; background: rgba(20,26,31,0.65);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl); box-shadow: 0 30px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.025);
      overflow: hidden; display: flex; flex-direction: column;
      border: 1px solid rgba(212,175,55,0.12); position: relative; z-index: 1;
    }
    .top-bar {
      background: rgba(15,20,25,0.55); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 0.85rem 1.5rem; display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; border-bottom: 1px solid rgba(212,175,55,0.08);
      gap: 0.7rem; position: sticky; top: 0; z-index: 50;
    }
    .brand { display: flex; align-items: center; gap: 0.5rem; }
    .brand i { font-size: 1.6rem; color: var(--gold); filter: drop-shadow(0 0 8px rgba(212,175,55,0.5)); animation: iconPulse 4s infinite ease-in-out; }
    @keyframes iconPulse { 0%,100% { filter: drop-shadow(0 0 8px rgba(212,175,55,0.5)); } 50% { filter: drop-shadow(0 0 18px rgba(212,175,55,0.8)); } }
    .brand h1 { font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; letter-spacing: 0.8px; color: var(--text-primary); }
    .brand h1 span { font-weight: 500; color: var(--gold); }
    .top-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .badge { padding: 0.28rem 0.85rem; border-radius: 20px; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.4px; display: flex; align-items: center; gap: 0.3rem; font-family: var(--font-mono); cursor: pointer; transition: var(--transition); }
    .badge-live { background: var(--gold-dim); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); }
    .badge-msg { background: rgba(255,255,255,0.03); border: 1px solid var(--steel); color: var(--text-muted); position: relative; }
    .badge-msg:hover { border-color: var(--gold); color: var(--gold); }
    .badge-count { position: absolute; top: -5px; right: -5px; background: var(--danger); color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 0.42rem; display: none; align-items: center; justify-content: center; font-weight: 700; }
    .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--profit); opacity: 0; transition: var(--transition); }
    .save-dot.visible { opacity: 1; box-shadow: var(--profit-glow); }
    .main-nav {

    }

    .nav-btn {

    .nav-btn:hover::after { width: 55%; } .nav-btn:hover { color: var(--gold-light); }
    .nav-btn.active { background: rgba(212,175,55,0.1); color: var(--gold); border-color: rgba(212,175,55,0.25); box-shadow: 0 0 10px rgba(212,175,55,0.15); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 1000px) { .grid-2 { grid-template-columns: 1fr; } }
    .card {

    .card-header {

    .chip { background: rgba(212,175,55,0.07); color: var(--gold-light); font-size: 0.48rem; padding: 0.08rem 0.45rem; border-radius: 10px; margin-left: 0.25rem; font-family: var(--font-mono); letter-spacing: 0.2px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.55rem; }
    @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .field { display: flex; flex-direction: column; gap: 0.18rem; }
    .field.span-2 { grid-column: span 2; } .field.span-3 { grid-column: span 3; }
    .field label { font-size: 0.52rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-label); font-weight: 500; }
    .field input, .field select { background: rgba(15,21,26,0.65); border: 1px solid var(--steel); border-radius: 0.45rem; padding: 0.42rem 0.5rem; font-size: 0.65rem; color: var(--text-primary); font-family: var(--font-mono); transition: var(--transition); }
    .field input:focus, .field select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(212,175,55,0.12); }
    .field input[type="range"] { padding: 0; accent-color: var(--gold); height: 6px; }
    .slider-row { display: flex; align-items: center; gap: 0.5rem; }
    .slider-row span { font-size: 0.55rem; color: var(--text-muted); min-width: 85px; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .val { color: var(--gold); font-weight: 700; font-size: 0.65rem; min-width: 45px; text-align: right; }
    .btn { font-weight: 700; padding: 0.45rem 0.9rem; border-radius: 22px; cursor: pointer; font-family: var(--font-mono); transition: var(--transition); font-size: 0.62rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem; letter-spacing: 0.3px; border: 1.5px solid transparent; }
    .btn-gold { background: rgba(212,175,55,0.07); border-color: var(--gold); color: var(--gold); }
    .btn-gold:hover { background: var(--gold); color: #0c0f14; box-shadow: var(--gold-glow); transform: translateY(-1px); }

    .btn-sm { padding: 0.22rem 0.6rem; font-size: 0.5rem; } .btn-full { width: 100%; }
    .metric { display: flex; justify-content: space-between; align-items: baseline; background: rgba(20,28,33,0.5); border-radius: 0.55rem; padding: 0.4rem 0.7rem; margin-bottom: 0.25rem; border: 1px solid rgba(255,255,255,0.025); }
    .metric-label { color: var(--text-muted); font-size: 0.56rem; text-transform: uppercase; }
    .metric-value { font-family: var(--font-display); font-weight: 800; font-size: 0.9rem; color: var(--text-primary); }
    .metric-value.green { color: var(--profit); text-shadow: var(--profit-glow); }
    .study-box { background: rgba(17,25,32,0.55); border-radius: 0.55rem; padding: 0.55rem; border-left: 3px solid var(--gold); font-size: 0.58rem; color: var(--text-secondary); line-height: 1.5; margin: 0.25rem 0; }

    .score-dial { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; color: var(--gold); margin: 0 auto 0.3rem; box-shadow: 0 0 14px rgba(212,175,55,0.2); }
    .pipeline-item { background: rgba(20,28,33,0.4); padding: 0.4rem 0.65rem; border-radius: 0.45rem; margin: 0.18rem 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.56rem; gap: 0.35rem; flex-wrap: wrap; border: 1px solid transparent; transition: var(--transition); }
    .pipeline-item:hover { border-color: rgba(212,175,55,0.12); background: rgba(26,35,40,0.5); }
    .tag { background: rgba(42,58,46,0.5); color: #b9d0b0; padding: 0.1rem 0.45rem; border-radius: 9px; font-size: 0.48rem; }
    .tag.gold { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(212,175,55,0.15); }
    .filter-bar { display: flex; gap: 0.2rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
    .filter-btn { background: transparent; border: 1px solid var(--steel); color: var(--text-muted); padding: 0.12rem 0.45rem; border-radius: 9px; cursor: pointer; font-family: var(--font-mono); font-size: 0.48rem; transition: var(--transition); }
    .filter-btn.on { background: var(--gold); color: #0c0f14; border-color: var(--gold); font-weight: 700; }
    .concept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0.6rem; margin-top: 0.5rem; }
    .concept-card { background: rgba(17,25,32,0.5); border: 1px solid rgba(255,255,255,0.03); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: var(--transition-slow); }
    .concept-card:hover { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.08); transform: translateY(-2px); }
    .concept-card.selected { border-color: var(--gold); border-width: 2px; box-shadow: 0 0 15px rgba(212,175,55,0.15); }
    .concept-img { height: 100px; background: linear-gradient(135deg, #1a2430, #243040); display: flex; align-items: center; justify-content: center; position: relative; }
    .concept-img i { font-size: 1.8rem; color: var(--gold-light); opacity: 0.5; }
    .concept-info { padding: 0.45rem; }
    .concept-info h4 { font-family: var(--font-display); font-size: 0.7rem; margin-bottom: 0.15rem; }
    .concept-badge { position: absolute; top: 5px; right: 5px; padding: 0.08rem 0.35rem; border-radius: 7px; font-size: 0.4rem; font-weight: 700; }
    .badge-roi { background: rgba(46,204,113,0.2); color: var(--profit); border: 1px solid rgba(46,204,113,0.4); }
    .badge-fit { background: rgba(93,173,226,0.2); color: var(--info); border: 1px solid rgba(93,173,226,0.4); }
    .badge-premium { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
    .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.65rem; }
    .empty-state i { font-size: 2rem; color: var(--gold); opacity: 0.3; margin-bottom: 0.5rem; display: block; }
    .lock-overlay { position: relative; }
    .locked { filter: blur(3px); pointer-events: none; user-select: none; opacity: 0.5; }
    .lock-badge { position: absolute; top: 8px; right: 12px; background: #0c0f14; color: var(--gold); padding: 0.2rem 0.7rem; border-radius: 14px; font-size: 0.55rem; border: 1px solid var(--gold); z-index: 2; display: none; font-weight: 600; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: rgba(26,33,39,0.9); backdrop-filter: blur(15px); border: 1px solid var(--gold); color: var(--text-primary); padding: 0.65rem 1.1rem; border-radius: var(--radius-md); z-index: 200; font-size: 0.6rem; box-shadow: var(--gold-glow); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>

                <div class="field"><label>PHASED?</label><select id="sph" onchange="updateAnalyzerUI()"><option value="false" ${!S.analysis?.inp?.ph?'selected':''}>Single</option><option value="true" ${S.analysis?.inp?.ph?'selected':''}>Multi (+12%)</option></select></div>
                <div class="field"><label>ELEVATOR?</label><select id="sec" onchange="updateAnalyzerUI()"><option value="false" ${!S.analysis?.inp?.ec?'selected':''}>No</option><option value="true" ${S.analysis?.inp?.ec!==false?'selected':''}>Yes</option></select></div>
                <div class="field span-3"><label>UNIT MIX % (St / 1BR / 2BR / 3BR)</label><div style="display:flex;gap:0.4rem;"><input id="sumSt" type="number" value="${S.analysis?.inp?.umSt||15}" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="St"><input id="sum1" type="number" value="${S.analysis?.inp?.um1||40}" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="1BR"><input id="sum2" type="number" value="${S.analysis?.inp?.um2||35}" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="2BR"><input id="sum3" type="number" value="${S.analysis?.inp?.um3||10}" onchange="updateAnalyzerUI()" style="flex:1;" placeholder="3BR"></div></div>
              </div>
              <div style="display:flex;gap:0.3rem;margin-top:0.6rem;"><button class="btn btn-gold" style="flex:1;" onclick="setTier('free')">🔍 FREE</button><button class="btn btn-gold" style="flex:1;" onclick="setTier('full')">📊 $499</button><button class="btn btn-gold" style="flex:1;" onclick="setTier('deep')">🧬 $1,499</button></div>
            </div>
            <div class="card lock-overlay" id="rc"><div id="lb" class="lock-badge">🔒 UNLOCK</div><div class="card-header"><i class="fas fa-chart-pie"></i> RESULTS <span class="chip">LIVE</span></div><div class="metric"><span class="metric-label">GDV</span><span class="metric-value" id="gv">$---</span></div><div class="metric"><span class="metric-label">COST</span><span class="metric-value" id="tc">$---</span></div><div class="metric"><span class="metric-label">PROFIT</span><span class="metric-value green" id="pv">$---</span></div><div class="metric"><span class="metric-label">ROI</span><span class="metric-value" id="rv">--%</span></div><hr style="border-color:rgba(255,255,255,0.05);"><div style="font-weight:600;color:var(--gold);font-size:0.65rem;">MASSING</div><div class="study-box" id="mc"></div><div style="font-weight:600;color:var(--gold);font-size:0.65rem;margin-top:0.3rem;">YIELD</div><div class="study-box" id="yc"></div><div id="ds" style="display:none;"><hr><div style="font-weight:600;color:var(--gold);font-size:0.65rem;">DEEP</div><div class="study-box" id="dc"></div></div></div>
            <div class="card" style="grid-column:1/-1;"><div class="card-header">RISK</div><div style="display:flex;gap:1rem;flex-wrap:wrap;font-size:0.6rem;"><div><span style="color:var(--text-muted);">ENTITLEMENT:</span> <span id="ev" style="font-weight:600;">-</span></div><div><span style="color:var(--text-muted);">NIMBY:</span> <span id="nv" style="font-weight:600;">-</span></div><div><span style="color:var(--text-muted);">MARKET:</span> <span id="mv" style="font-weight:600;">-</span></div></div></div>
          </div>`,
        concepts: () => { const filtered = filtC(); return `
          <div class="card" style="grid-column:1/-1;"><div class="card-header"><i class="fas fa-paint-brush"></i> CONCEPT GALLERY — 24 STYLES <span class="chip">$1,999/PKG</span></div>
            <div class="filter-bar"><span style="color:var(--text-muted);font-size:0.5rem;font-weight:600;">STYLE:</span>${['all','modern','industrial','warm','specialty'].map(s=>`<button class="filter-btn ${S.conceptFilter.style===s?'on':''}" onclick="setCF('style','${s}')">${s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}<span style="color:var(--text-muted);font-size:0.5rem;font-weight:600;margin-left:0.5rem;">INDUSTRY:</span>${['all','multifamily','mixed-use','office','hospitality'].map(s=>`<button class="filter-btn ${S.conceptFilter.industry===s?'on':''}" onclick="setCF('industry','${s}')">${s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}<span style="color:var(--text-muted);font-size:0.5rem;font-weight:600;margin-left:0.5rem;">SCALE:</span>${['all','small','medium','large'].map(s=>`<button class="filter-btn ${S.conceptFilter.scale===s?'on':''}" onclick="setCF('scale','${s}')">${s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('')}</div>
            ${filtered.length === 0 ? `<div class="empty-state"><i class="fas fa-search"></i><p>No concepts match these filters.</p><button class="btn btn-gold btn-sm" style="margin-top:0.5rem;" onclick="setCF('style','all');setCF('industry','all');setCF('scale','all');">RESET FILTERS</button></div>` : `<div class="concept-grid">${filtered.map(c=>`<div class="concept-card ${S.selConcepts.includes(c.id)?'selected':''}" onclick="previewConcept(${c.id})"><div class="concept-img"><i class="fas fa-${c.ic}"></i>${c.ba?`<span class="concept-badge ${c.ba==='best-roi'?'badge-roi':c.ba==='best-fit'?'badge-fit':'badge-premium'}">${c.bt}</span>`:''}</div><div class="concept-info"><h4>${c.n}</h4><div style="display:flex;gap:0.2rem;"><span class="tag">${c.ur}u</span><span class="tag gold">${c.re}</span></div><div style="display:flex;gap:0.2rem;margin-top:0.3rem;"><button class="btn btn-gold btn-sm" style="flex:1;" onclick="event.stopPropagation();previewConcept(${c.id})">👁</button><button class="btn btn-gold fill btn-sm" style="flex:1;" onclick="event.stopPropagation();purchaseConcept(${c.id})">$1,999</button></div></div></div>`).join('')}</div><div style="font-size:0.5rem;color:var(--text-muted);margin-top:0.5rem;text-align:center;">${filtered.length} of 24 concepts</div>`}
          </div>`; },
        finance: () => `
          <div class="grid-2">
            <div class="card"><div class="card-header"><i class="fas fa-coins"></i> CAPITAL STACK</div>${[{l:'Senior Debt',v:65},{l:'Mezzanine',v:15},{l:'Pref Equity',v:10},{l:'Sponsor',v:10}].map(x=>`<div class="slider-row"><span>${x.l}</span><input type="range" value="${x.v}"><span class="val">${x.v}%</span></div>`).join('')}<div class="study-box"><strong>WACC:</strong> 9.8% · <strong>DSCR:</strong> 1.42x</div></div>
            <div class="card"><div class="card-header"><i class="fas fa-sliders-h"></i> SCENARIOS</div><table style="width:100%;font-size:0.55rem;border-collapse:collapse;"><tr><th style="text-align:left;"> </th><th style="color:var(--danger);">Conservative</th><th style="color:var(--gold);">Base</th><th style="color:var(--profit);">Aggressive</th></tr><tr><td>Rent</td><td style="color:var(--danger);">$2,800</td><td style="color:var(--gold);">$3,300</td><td style="color:var(--profit);">$3,800</td></tr><tr><td>Cost/SF</td><td style="color:var(--danger);">$270</td><td style="color:var(--gold);">$255</td><td style="color:var(--profit);">$235</td></tr><tr style="border-top:2px solid var(--gold);"><td><strong>ROI</strong></td><td style="color:var(--danger);"><strong>14.2%</strong></td><td style="color:var(--gold);"><strong>24.7%</strong></td><td style="color:var(--profit);"><strong>35.1%</strong></td></tr></table></div>
            <div class="card" style="grid-column:1/-1;"><div class="card-header"><i class="fas fa-balance-scale"></i> COMPARISON</div>${S.compDeals.length===0?'<p style="font-size:0.55rem;color:var(--text-muted);">Add deals with +Compare</p>':S.compDeals.map(d=>`<div class="pipeline-item"><span>${d.n}</span><span style="color:var(--gold);">${d.sc}</span><span style="color:var(--profit);">${d.r}%</span><button class="btn btn-sm" style="border-color:var(--steel);color:var(--text-muted);" onclick="removeComp(${d.id})">✕</button></div>`).join('')}</div>
          </div>`,
        research: () => `
          <div class="grid-2">
            <div class="card"><div class="card-header"><i class="fas fa-gavel"></i> REGULATORY</div><div style="font-size:0.55rem;line-height:1.8;"><p>✅ Zoning: C-MU (verified)</p><p>⚠️ Fees: $18,500/unit</p><p>⚠️ Inclusionary: 10%</p><p>📋 Timeline: 8-11mo</p></div></div>
            <div class="card"><div class="card-header"><i class="fas fa-map-marked-alt"></i> COMPETITIVE</div><div class="study-box">2,450 units in 3mi · 32% absorption</div><div class="pipeline-item"><span>🔴 The Travis (220u)</span><span>0.8mi</span></div><div class="pipeline-item"><span>🟠 Riverfront (340u)</span><span>1.2mi</span></div></div>
          </div>`,
        network: () => `
          <div class="grid-2">
            <div class="card"><div class="card-header"><i class="fas fa-users"></i> CONTACTS</div>${S.contacts.map(c=>`<div class="pipeline-item"><span>${c.av} ${c.n}</span><span style="font-size:0.48rem;">${c.rl}</span><div style="display:flex;gap:0.2rem;"><a href="tel:${c.ph.replace(/-/g,'')}" class="btn btn-sm" style="background:rgba(46,204,113,0.1);border-color:var(--profit);color:var(--profit);text-decoration:none;">📞</a><a href="sms:${c.ph.replace(/-/g,'')}" class="btn btn-sm" style="background:rgba(93,173,226,0.1);border-color:var(--info);color:var(--info);text-decoration:none;">💬</a><a href="mailto:${c.em}" class="btn btn-gold btn-sm" style="text-decoration:none;">✉️</a></div></div>`).join('')}</div>
            <div class="card"><div class="card-header"><i class="fas fa-phone-alt"></i> RECENT</div>${S.callHistory.length===0&&S.smsHistory.length===0?'<p style="font-size:0.55rem;color:var(--text-muted);text-align:center;">No activity</p>':''}</div>
          </div>`,
      };

      window.updateAnalyzerUI = updateAnalyzerUI; window.setTier = setTier; window.setCF = setCF;
      window.addComp = addComp; window.removeComp = removeComp;
      window.previewConcept = previewConcept; window.purchaseConcept = purchaseConcept;
      window.openChat = openChat; window.openGlobalChat = openGlobalChat;
      window.render = render;

      document.getElementById('mainNav').addEventListener('click', e => { const b = e.target.closest('.nav-btn'); if (!b) return; document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(b.dataset.view); });
      document.addEventListener('scroll', () => { document.querySelectorAll('.card').forEach(c => { const r = c.getBoundingClientRect(); if (r.top < window.innerHeight - 60) c.classList.add('visible'); }); }, { passive: true });

      for (let i = 0; i < 6; i++) { const p = document.createElement('div'); p.className = 'particle'; p.style.left = Math.random() * 100 + '%'; p.style.width = (Math.random() * 3 + 1) + 'px'; p.style.height = p.style.width; p.style.animationDelay = Math.random() * 9 + 's'; p.style.animationDuration = (Math.random() * 6 + 6) + 's'; document.getElementById('particles').appendChild(p); }

      load(); S.analysis = analyze(); updateBadge(); render(S.curView || 'dashboard');
    })();
  </script>
</body>
</html>
